services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: controlplane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: controlplane
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplane"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  controlplane:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://controlplane:changeme@postgres:5432/controlplane?sslmode=disable}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
