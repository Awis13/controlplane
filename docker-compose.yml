services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: controlplane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: controlplane
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplane"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  controlplane:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-8085}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://controlplane:changeme@postgres:5432/controlplane?sslmode=disable}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEBAUTHN_RPID: ${WEBAUTHN_RPID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
