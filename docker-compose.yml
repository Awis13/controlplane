services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: controlplane
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: controlplane
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplane"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  controlplane:
    build: .
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      DATABASE_URL: postgres://controlplane:${POSTGRES_PASSWORD:?}@127.0.0.1:5432/controlplane?sslmode=disable
      LISTEN_ADDR: ${BIND_ADDR:-100.93.29.111}:${HOST_PORT:-8085}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEBAUTHN_RPID: ${WEBAUTHN_RPID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      REGISTRATION_TOKEN: ${REGISTRATION_TOKEN:-}
      WG_HUB_PUBLIC_KEY: ${WG_HUB_PUBLIC_KEY:-}
      WG_HUB_ENDPOINT: ${WG_HUB_ENDPOINT:-}
      WG_NETWORK_CIDR: ${WG_NETWORK_CIDR:-10.10.0.0/24}
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-}
      CADDY_SERVER_NAME: ${CADDY_SERVER_NAME:-srv1}
      CADDY_DOMAIN: ${CADDY_DOMAIN:-freeradio.app}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://${BIND_ADDR:-100.93.29.111}:${HOST_PORT:-8085}/healthz"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
