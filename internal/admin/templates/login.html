<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Control Plane</title>
  <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <span class="logo">CONTROL PLANE</span>
      {{if .HasCredentials}}
        <h1>Welcome back</h1>
        <p>Authenticate with Touch ID to continue</p>
        <button id="loginBtn" onclick="doLogin()">Login with Touch ID</button>
      {{else}}
        <h1>Setup</h1>
        <p>Register a passkey to secure your admin panel</p>
        <input type="text" id="setupToken" placeholder="Setup token" class="setup-input">
        <button id="registerBtn" onclick="doRegister()">Set up Touch ID</button>
      {{end}}
      <div id="error" class="error"></div>
    </div>
  </div>

  <script src="/admin/static/webauthn.js"></script>
</body>
</html>
