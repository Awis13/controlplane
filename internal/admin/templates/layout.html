{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Control Plane</title>
  <link rel="stylesheet" href="/admin/static/style.css">
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <script src="/admin/static/alpine.min.js" defer></script>
  <script src="/admin/static/app.js"></script>
  <script src="/admin/static/htmx.min.js"></script>
</head>
<body x-data>
  <!-- Sidebar -->
  <aside class="sidebar" :class="$store.sidebar.collapsed ? 'collapsed' : ''">
    <div class="sidebar-header">
      <span class="sidebar-logo" x-show="!$store.sidebar.collapsed">CONTROL PLANE</span>
      <span class="sidebar-logo-short" x-show="$store.sidebar.collapsed">CP</span>
      <button class="sidebar-toggle" @click="$store.sidebar.toggle()" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 3h12v1.5H2zm0 4.25h12v1.5H2zm0 4.25h12v1.5H2z"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/" class="nav-item {{if eq .Nav "dashboard"}}active{{end}}" title="Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="/admin/nodes" class="nav-item {{if eq .Nav "nodes"}}active{{end}}" title="Nodes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>
        <span class="nav-label">Nodes</span>
      </a>
      <a href="/admin/projects" class="nav-item {{if eq .Nav "projects"}}active{{end}}" title="Projects">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="nav-label">Projects</span>
      </a>
      <a href="/admin/tenants" class="nav-item {{if eq .Nav "tenants"}}active{{end}}" title="Tenants">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span class="nav-label">Tenants</span>
      </a>
      <a href="/admin/audit" class="nav-item {{if eq .Nav "audit"}}active{{end}}" title="Audit Log">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span class="nav-label">Audit Log</span>
      </a>
      <a href="/admin/settings" class="nav-item {{if eq .Nav "settings"}}active{{end}}" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <form method="POST" action="/admin/logout">
        <button type="submit" class="nav-item logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="nav-label">Logout</span>
        </button>
      </form>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content" :class="$store.sidebar.collapsed ? 'sidebar-collapsed' : ''">
    <!-- Breadcrumbs -->
    {{if .Breadcrumbs}}
    <div class="breadcrumbs">
      {{range $i, $b := .Breadcrumbs}}{{if $i}} <span class="breadcrumb-sep">/</span> {{end}}{{if $b.URL}}<a href="{{$b.URL}}">{{$b.Label}}</a>{{else}}<span class="breadcrumb-current">{{$b.Label}}</span>{{end}}{{end}}
    </div>
    {{end}}

    <!-- Flash messages (legacy, for non-toast HTMX responses) -->
    <div id="flash"></div>

    {{template "content" .}}
  </main>

  <!-- Toast container -->
  <div class="toast-container" x-data>
    <template x-for="toast in $store.toasts.items" :key="toast.id">
      <div class="toast" :class="[toast.type, toast.leaving ? 'leaving' : '']"
           @click="$store.toasts.remove(toast.id)">
        <span x-text="toast.msg"></span>
      </div>
    </template>
  </div>
</body>
</html>
{{end}}
