{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Control Plane</title>
  <link rel="stylesheet" href="/admin/static/style.css">
  <script src="/admin/static/htmx.min.js"></script>
</head>
<body>
  <nav>
    <span class="logo">CONTROL PLANE</span>
    <a href="/admin/" {{if eq .Nav "dashboard"}}class="active"{{end}}>Dashboard</a>
    <a href="/admin/nodes" {{if eq .Nav "nodes"}}class="active"{{end}}>Nodes</a>
    <a href="/admin/projects" {{if eq .Nav "projects"}}class="active"{{end}}>Projects</a>
    <a href="/admin/tenants" {{if eq .Nav "tenants"}}class="active"{{end}}>Tenants</a>
  </nav>
  <div class="container">
    <div id="flash"></div>
    {{template "content" .}}
  </div>
</body>
</html>
{{end}}
