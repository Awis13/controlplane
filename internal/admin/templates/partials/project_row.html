{{define "project_row"}}
<tr>
  <td>{{.Name}}</td>
  <td>{{.TemplateID}}</td>
  <td class="mono">{{if .Ports}}{{joinInts .Ports}}{{else}}<span class="text-muted">—</span>{{end}}</td>
  <td class="mono">{{.HealthPath}}</td>
  <td>{{.RAMMB}}</td>
  <td class="text-muted">{{fmtTime .CreatedAt}}</td>
</tr>
{{end}}
