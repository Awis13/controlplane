{{define "tenant_row"}}
<tr id="tenant-{{.ID}}"
  {{if or (eq .Status "provisioning") (eq .Status "deleting")}}
    hx-get="/admin/tenants/{{.ID}}/row"
    hx-trigger="every 3s"
    hx-swap="outerHTML"
    class="polling"
  {{end}}>
  <td>{{.Name}}</td>
  <td class="mono">{{.Subdomain}}</td>
  <td>{{.ProjectName}}</td>
  <td>{{.NodeName}}</td>
  <td class="mono">{{if .LXCID}}{{derefInt .LXCID}}{{else}}<span class="text-muted">—</span>{{end}}</td>
  <td>
    <span class="badge badge-{{.Status}}">{{.Status}}</span>
    {{if .ErrorMessage}}<span class="text-muted" style="font-size:11px;margin-left:4px">{{derefStr .ErrorMessage}}</span>{{end}}
  </td>
  <td class="text-right">
    {{if or (eq .Status "active") (eq .Status "error")}}
    <button class="btn-danger btn-sm"
      hx-delete="/admin/tenants/{{.ID}}"
      hx-target="#tenant-{{.ID}}"
      hx-swap="outerHTML"
      hx-confirm="Delete tenant {{.Name}}?">Delete</button>
    {{end}}
  </td>
</tr>
{{end}}
